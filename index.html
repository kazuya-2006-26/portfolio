<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jaydey — Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script defer src="assets/js/lang.js"></script>
    <script defer src="assets/js/theme.js"></script>
    <script defer src="assets/js/scroll.js"></script>
    <script defer src="assets/js/projects.js"></script>
    <script defer src="assets/js/general.js"></script>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li data-i18n="nav.home" data-target="home"></li>
                <li data-i18n="nav.about" data-target="about"></li>
                <li data-i18n="nav.projects" data-target="projects"></li>
                <li data-i18n="nav.contact" data-target="contact"></li>
            </ul>
        </nav>

        <div class="controls">
            <div class="lang-switch">
                <button onclick="loadLanguage('en')">EN</button>
                <button onclick="loadLanguage('nl')">NL</button>
            </div>

            <div class="theme-switch">
                <button id="themeToggle" onclick="toggleTheme()">🌙</button>
            </div>            
        </div>
    </header>

    <section id="home" class="hero fade-in">
        <h1 data-i18n="hero.title"></h1>
        <p data-i18n="hero.subTitle"></p>
    </section>

    <section id="about" class="about fade-in">
        <div class="about-container">
            
            <div class="about-left">
                <img src="assets/images/me.jpeg" alt="Photo of Jaydey" class="about-photo">
            </div>

            <div class="about-right">
                <h2 data-i18n="about.title"></h2>
                <p data-i18n="about.text"></p>
                <p data-i18n="about.text2"></p>
            </div>

        </div>
    </section>


    <section class="languages fade-in">
        <h2 data-i18n="lang.title"></h2>
        <ul class="lang-list">
            <li>
                🇬🇧
                <span data-i18n="lang.english"></span>
                —
                <span data-i18n="lang.lvl.fluent"></span>
            </li>
            <li>
                🇳🇱
                <span data-i18n="lang.dutch"></span>
                —
                <span data-i18n="lang.lvl.native"></span>
            </li>
            <li>
                🇯🇵
                <span data-i18n="lang.japanese"></span>
                —
                <span data-i18n="lang.lvl.learning"></span>
            </li>

        </ul>
    </section>

    <section class="skills fade-in">
        <h2 data-i18n="skills.title"></h2>
        <div class="skills-list">
            <div class="skill"><span data-i18n="skills.rust"></span><div class="bar"><div style="width: 90%"></div></div></div>
            <div class="skill"><span data-i18n="skills.js"></span><div class="bar"><div style="width: 70%"></div></div></div>
            <div class="skill"><span data-i18n="skills.web"></span><div class="bar"><div style="width: 80%"></div></div></div>
        </div>
    </section>

    <section id="featured-container"></section>

    <section id="projects" class="projects fade-in">
        <h2 data-i18n="projects.title"></h2>
        <div class="project-filters">
            <button data-filter="all" data-i18n="projects.filters.all" class="active"></button>
            <button data-filter="rust" data-i18n="projects.filters.rust"></button>
            <button data-filter="web" data-i18n="projects.filters.web"></button>
            <button data-filter="tools" data-i18n="projects.filters.tools"></button>
        </div>
        <div id="project-list" class="project-list"></div>
    </section>

    <section id="contact" class="contact fade-in">
        <h2 data-i18n="contact.title"></h2>
        
        <div class="contact-grid">
            <div class="contact-item">
                <h3 data-i18n="contact.email"></h3>
                <a href="mailto:you@example.com" class="contact-link">you@example.com</a>
            </div>

            <div class="contact-item">
                <h3 data-i18n="contact.cv.title"></h3>
                <a href="assets/data/Jaydey-cv.pdf" class="cv-button" download data-i18n="contact.cv.download"></a>
            </div>
        </div>
    </section>
    <button id="scrollTopBtn">↑</button>
    
    <footer>
        <div class="social-bar">
            <a href="https://github.com/yourprofile" target="_blank">
                <img class="icon" src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/github.svg">
            </a>
            <a href="https://linkedin.com/in/yourprofile" target="_blank">
                <img class="icon" src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/linkedin.svg">
            </a>
            <a href="mailto:you@example.com">
                <img class="icon" src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/maildotru.svg">
            </a>
        </div>
        <p id="last-updated"></p>
    </footer>

    <div id="projectModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">×</button>
            <h3 id="modalTitle"></h3>
            <p id="modalDescription"></p>
            <p id="modalTags"></p>
            <a id="modalLink" href="#" target="_blank" data-i18n="projects.modal.github"></a>
        </div>
    </div>

</body>
</html>
